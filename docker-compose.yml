services:
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - hub
  #     - console

  hub:
    build: .
    image: optics-hub:latest
    env_file:
      - ../OPTiCS-Infra/env/hub.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    expose:
      - "3000"
  
  gateway:
    build: .
    image: optics-hub:latest
    command: ["node", "tunnel/index.ts"]
    env_file:
      - ../OPTiCS-Infra/env/gateway.env
    environment:
      HUB_API_URL: http://hub:3000
    ports:
      - "5220:5220"
      - "10000:10000"
    depends_on:
      - hub
  
  console:
    build:
      context: ../OPTiCS-Hub-Console
      args:
        VITE_API_URL: http://localhost:3000
    image: optics-hub-console:latest
    env_file:
      - ../OPTiCS-Infra/env/hub-console.env
    ports:
      - "80:5173"
    expose:
      - "5173"

  mysql:
    image: mysql:8
    env_file:
      - ../OPTiCS-Infra/env/mysql.env
    ports:
      - "3307:3306"
    expose:
      - "3306"
    volumes:
      - mysql-optics:/var/lib/mysql

volumes:
  mysql-optics: